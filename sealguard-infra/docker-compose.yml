version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: sealguard-postgres
    environment:
      POSTGRES_DB: sealguard
      POSTGRES_USER: sealguard
      POSTGRES_PASSWORD: sealguard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: sealguard-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
